{% load static %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accès refusé | Richat DataBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <span class="eyebrow">Sécurité</span>
        <h1>Accès refusé</h1>
        <p>Cette application est réservée aux superusers autorisés. Un compte staff seul ne suffit pas.</p>
        <form method="post" action="{% url 'dashboard:logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-primary">Déconnexion</button>
        </form>
      </section>
    </main>
  </body>
</html>
